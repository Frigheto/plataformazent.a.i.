<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Nova Senha — ZENT A.I.</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Defina uma nova senha para sua conta ZENT A.I.">

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.82em%22 font-size=%2268%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22white%22 x=%2250%22 text-anchor=%22middle%22>Z</text></svg>">
</head>

<body class="auth-page">

    <!-- Header simples -->
    <header class="checkout-header-bar">
        <div class="checkout-header-inner">
            <a href="index.html" class="logo">ZENT<span>A.I.</span></a>
            <div class="checkout-header-secure">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Acesso seguro
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 style="text-align: center; margin-bottom: 8px; font-size: 24px;">Definir Nova Senha</h1>
            <p style="text-align: center; color: #666; margin-bottom: 32px;">Escolha uma nova senha para sua conta</p>

            <!-- Mensagem de feedback -->
            <div id="auth-message" class="auth-message" style="display:none;"></div>

            <!-- Loading state -->
            <div id="loading-state" style="display:none; text-align: center; padding: 40px 0;">
                <div style="width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                <p style="margin-top: 16px; color: #666;">Carregando...</p>
            </div>

            <!-- Formulário de atualizar senha -->
            <form id="form-update-password" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="new-password">Nova Senha</label>
                    <input type="password" id="new-password" name="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" minlength="8">
                    <span class="form-error" id="error-new-password"></span>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <input type="password" id="confirm-password" name="confirm" placeholder="Confirme sua nova senha" required autocomplete="new-password" minlength="8">
                    <span class="form-error" id="error-confirm-password"></span>
                </div>

                <button type="submit" class="btn btn-primary full-width" id="update-submit">
                    Atualizar Senha
                </button>
            </form>

            <!-- Sucesso -->
            <div id="update-success" class="auth-verify-msg" style="display:none;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h2>Senha atualizada!</h2>
                <p>Sua nova senha foi configurada com sucesso.<br>Agora você pode fazer login com sua nova senha.</p>
                <button type="button" class="btn btn-primary full-width" id="go-to-login">Ir para login</button>
            </div>

            <!-- Erro (link expirado) -->
            <div id="error-state" class="auth-verify-msg" style="display:none;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <h2>Link expirado ou inválido</h2>
                <p id="error-message"></p>
                <button type="button" class="btn btn-outline" id="error-back-to-reset">Solicitar novo link</button>
            </div>

        </div>
    </main>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/update-password-page.js"></script>
</body>

</html>
