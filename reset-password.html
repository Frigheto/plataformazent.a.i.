<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — ZENT A.I.</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Recupere o acesso à sua conta ZENT A.I.">

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.82em%22 font-size=%2268%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22white%22 x=%2250%22 text-anchor=%22middle%22>Z</text></svg>">
</head>

<body class="auth-page">

    <!-- Header simples -->
    <header class="checkout-header-bar">
        <div class="checkout-header-inner">
            <a href="index.html" class="logo">ZENT<span>A.I.</span></a>
            <div class="checkout-header-secure">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Acesso seguro
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 style="text-align: center; margin-bottom: 8px; font-size: 24px;">Recuperar Senha</h1>
            <p style="text-align: center; color: #666; margin-bottom: 32px;">Digite seu e-mail para receber um link de recuperação</p>

            <!-- Mensagem de feedback -->
            <div id="auth-message" class="auth-message" style="display:none;"></div>

            <!-- Formulário de recuperação de senha -->
            <form id="form-reset-password" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="reset-email">E-mail</label>
                    <input type="email" id="reset-email" name="email" placeholder="seu@email.com" required autocomplete="email">
                    <span class="form-error" id="reset-error-email"></span>
                </div>

                <button type="submit" class="btn btn-primary full-width" id="reset-submit">
                    Enviar link de recuperação
                </button>

                <p class="auth-switch-text">
                    <button type="button" class="auth-link-btn" id="back-to-login">Voltar para login</button>
                </p>
            </form>

            <!-- Confirmação de envio -->
            <div id="reset-success" class="auth-verify-msg" style="display:none;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h2>E-mail enviado!</h2>
                <p>Verifique seu e-mail em <strong id="reset-sent-email"></strong>.<br>Clique no link para criar uma nova senha.</p>
                <button type="button" class="btn btn-outline" id="reset-back-to-login">Voltar para login</button>
            </div>

        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reset-password-page.js"></script>
</body>

</html>
